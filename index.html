<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الكبائن السوداء | Black Cabin — SMOU GROUP</title>

<style>
:root{
  --black:#0f0f0f;
  --black2:#1c1c1c;
  --accent:#2f2f2f;
  --accent2:#444;
  --bg:#f4f4f4;
  --card:#ffffff;
  --shadow:0 10px 30px rgba(0,0,0,.2);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

/* ===== HERO ===== */
.hero{
  min-height:55vh;
  padding:40px 0;
  color:#fff;
  position:relative;
  background:
    url("back.webp") center/cover no-repeat,
    url("back.jpg") center/cover no-repeat,
    url("back.png") center/cover no-repeat,
    linear-gradient(180deg,var(--black),var(--black2));
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.75),rgba(0,0,0,.75));
}
.container{
  position:relative;
  max-width:1300px;
  margin:auto;
  padding:0 20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:50px;height:50px;
  border-radius:12px;
  background:rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo img{
  width:80%;
  height:80%;
  object-fit:contain;
}

.titleBox h1{
  margin:0;
  font-size:20px;
}
.titleBox span{
  font-size:12px;
  opacity:.9;
}

.heroText{
  margin-top:90px;
}
.heroText h2{
  margin:0;
  font-size:28px;
}
.heroText p{
  margin-top:10px;
  opacity:.9;
}

/* ===== Gallery ===== */
main{
  max-width:1300px;
  margin:40px auto;
  padding:0 20px;
}

.track{
  display:flex;
  gap:20px;
  overflow:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:10px;
}

.card{
  min-width:250px;
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  box-shadow:var(--shadow);
  scroll-snap-align:start;
  cursor:pointer;
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
}

.thumb{
  aspect-ratio:3/4;
  overflow:hidden;
}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.meta{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.meta b{
  color:var(--black2);
}

.open{
  text-decoration:none;
  background:var(--accent);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
}
.open:hover{
  background:var(--accent2);
}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#666;
}

@media(max-width:600px){
  .card{min-width:210px}
}
</style>
</head>

<body>

<section class="hero">
<div class="container">

  <div class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="logo.png" alt="SMOU GROUP">
      </div>
      <div class="titleBox">
        <h1>الكبائن السوداء — Black Cabin</h1>
        <span>SMOU GROUP</span>
      </div>
    </div>
  </div>

  <div class="heroText">
    <h2>معرض الكبائن السوداء</h2>
    <p>اسحب يمين أو يسار للتصفح. اضغط فتح لعرض الجولة 360°.</p>
  </div>

</div>
</section>

<main>
<div class="track" id="track"></div>
</main>

<footer>
© <span id="year"></span> SMOU GROUP
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const items = [
{img:"B001.png",href:"https://my.3vfang.com/p/share/content.php?m=a3I4MDM5LWl0ZW09NTI2OTE="},
{img:"B002.png",href:"https://my.3vfang.com/p/share/content.php?m=a3I4MDM5LWl0ZW09NTI2ODk="},
{img:"B003.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTQyMjA2"},
{img:"B004.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzkx"},
{img:"B005.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzk5"},
{img:"B006.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1NDI5"},
{img:"B007.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1NDMx"},
{img:"B008.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1NDMy"},
{img:"B009.png",href:"https://s.3vfang.com/p/share/scontent.php?m=MTU5NjI1ODA4MTktaXRlbT01NTAwNw=="},
{img:"B010.png",href:"https://s.3vfang.com/p/share/scontent.php?m=MTU5NjI1ODA4MTktaXRlbT01NTAwOA=="},
{img:"B011.png",href:"https://s.3vfang.com/p/share/scontent.php?m=MTU5NjI1ODA4MTktaXRlbT01NTAxMA=="},
{img:"B012.png",href:"https://s.3vfang.com/p/share/scontent.php?m=MTU5NjI1ODA4MTktaXRlbT01NTAxMw=="}
];

const track = document.getElementById("track");

items.forEach(it=>{
  const code = it.img.replace(".png","");
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="thumb">
      <img src="${it.img}" alt="${code}">
    </div>
    <div class="meta">
      <b>${code}</b>
      <a class="open" href="${it.href}" target="_blank">فتح</a>
    </div>
  `;
  track.appendChild(card);
});
</script>

</body>
</html>
